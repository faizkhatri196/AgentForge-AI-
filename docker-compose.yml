version: "3.8"

services:
  mongodb:
    image: mongo:6-jammy
    container_name: agentforge_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    container_name: agentforge_redis
    ports:
      - "6379:6379"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agentforge_server
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/agentforge
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=agentforge_obsidian_key
      - PORT=5000
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge_frontend
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongodata:
